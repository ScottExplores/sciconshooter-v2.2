<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta property="fc:miniapp" content='{"version":"next","imageUrl":"https://sciconshooter.xyz/icon.png","button":{"title":"Play Scicon Shooter","action":{"type":"launch_miniapp","name":"Scicon Shooter","url":"https://sciconshooter.xyz"}}}' />
    <title>SciCon Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap');
      
      body {
        margin: 0;
        overflow: hidden;
        background-color: #0b1020;
        font-family: 'Inter', sans-serif;
        touch-action: none; /* Prevent pull-to-refresh on mobile */
      }
      
      /* --- LAYOUT FIXES FOR VERCEL --- */
      #root {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* Ensures the game background sits behind everything */
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Ensures the React UI sits ON TOP of the game */
      #root > div {
        position: relative;
        z-index: 10;
        height: 100%;
        width: 100%;
      }
      /* ------------------------------- */

      h1, h2, h3, .arcade-font {
        font-family: 'Orbitron', sans-serif;
      }

      /* Custom scrollbar for modals */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a2035; 
      }
      ::-webkit-scrollbar-thumb {
        background: #6c63ff; 
        border-radius: 4px;
      }

      /* --- SCICON CARD SYSTEM --- */
      .scicon-card {
        position: relative;
        background: #000000;
        clip-path: polygon(
          20px 0, calc(100% - 20px) 0, 
          100% 20px, 100% calc(100% - 20px), 
          calc(100% - 20px) 100%, 20px 100%, 
          0 calc(100% - 20px), 0 20px
        );
      }

      /* The Border & Glow Container */
      .scicon-border-container {
        position: absolute;
        inset: -2px; 
        background: linear-gradient(135deg, #4b5563 0%, #9ca3af 50%, #4b5563 100%); 
        z-index: -1;
        clip-path: polygon(
          20px 0, calc(100% - 20px) 0, 
          100% 20px, 100% calc(100% - 20px), 
          calc(100% - 20px) 100%, 20px 100%, 
          0 calc(100% - 20px), 0 20px
        );
      }
      
      /* Electric Pulse Animation */
      @keyframes electric-pulse {
        0% { 
          filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.6));
        }
        50% { 
          filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.8)) drop-shadow(0 0 15px rgba(99, 102, 241, 0.6));
        }
        100% { 
          filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.6));
        }
      }

      .scicon-electric-border {
        background: linear-gradient(135deg, #4f46e5 0%, #a78bfa 50%, #4f46e5 100%) !important;
        animation: electric-pulse 3s infinite ease-in-out;
      }
      
      /* Blue Glow Pulse for Referral Button */
      @keyframes blue-glow-pulse {
        0%, 100% { 
          filter: drop-shadow(0 0 2px rgba(92, 92, 255, 0.5));
        }
        50% { 
          filter: drop-shadow(0 0 8px rgba(92, 92, 255, 0.9)) drop-shadow(0 0 12px rgba(92, 92, 255, 0.6));
        }
      }
      
      .blue-glow-animate {
        animation: blue-glow-pulse 2s infinite ease-in-out;
      }
      
      .scicon-inner-bg {
         position: absolute;
         inset: 2px;
         background: rgba(5, 5, 10, 0.95);
         clip-path: polygon(
          19px 0, calc(100% - 19px) 0, 
          100% 19px, 100% calc(100% - 19px), 
          calc(100% - 19px) 100%, 19px 100%, 
          0 calc(100% - 19px), 0 19px
        );
      }

      /* The Circuit Nodes */
      .scicon-node {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #9ca3af;
        border-radius: 50%;
        z-index: 10;
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
      }

      .node-tl-1 { top: -4px; left: 16px; }
      .node-tl-2 { top: 16px; left: -4px; }
      .node-tr-1 { top: -4px; right: 16px; }
      .node-tr-2 { top: 16px; right: -4px; }
      .node-bl-1 { bottom: -4px; left: 16px; }
      .node-bl-2 { bottom: 16px; left: -4px; }
      .node-br-1 { bottom: -4px; right: 16px; }
      .node-br-2 { bottom: 16px; right: -4px; }

      /* Buttons */
      .scicon-btn {
        position: relative;
        background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
        border: none;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        transition: all 0.2s ease;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.1em;
      }
      .scicon-btn:hover {
        filter: brightness(1.2);
        transform: translateY(-1px);
        box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
      }
      .scicon-btn:active {
        transform: scale(0.98);
      }
      .scicon-btn-secondary {
        background: transparent;
        border: 1px solid #4b5563;
      }
      .scicon-btn-secondary:hover {
        background: rgba(255,255,255,0.05);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
