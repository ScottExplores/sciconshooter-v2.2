<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="fc:miniapp" content='{
      "version": "next",
      "imageUrl": "https://sciconshooter.xyz/preview.png",
      "button": {
        "title": "Play Scicon Shooter",
        "action": {
          "type": "launch_frame",
          "name": "Scicon Shooter",
          "url": "https://sciconshooter.xyz",
          "splashImageUrl": "https://sciconshooter.xyz/icon.png",
          "splashBackgroundColor": "#0b1020"
        }
      }
    }' />

    <meta property="og:title" content="Scicon Shooter" />
    <meta property="og:description" content="A sci-fi shooter game on Base. Blast enemies and earn rewards!" />
    <meta property="og:image" content="https://sciconshooter.xyz/preview.png" />
    <meta property="og:url" content="https://sciconshooter.xyz" />
    <meta property="og:type" content="website" />

    <title>SciCon Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap');
      
      body {
        margin: 0;
        overflow: hidden;
        background-color: #0b1020;
        font-family: 'Inter', sans-serif;
        touch-action: none; /* Prevent pull-to-refresh on mobile */
      }
      
      /* --- LAYOUT FIXES FOR VERCEL --- */
      #root {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* Ensures the game background sits behind everything */
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Ensures the React UI sits ON TOP of the game */
      #root > div {
        position: relative;
        z-index: 10;
        height: 100%;
        width: 100%;
      }
      /* ------------------------------- */

      h1, h2, h3, .arcade-font {
        font-family: 'Orbitron', sans-serif;
      }

      /* Custom scrollbar for modals */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a2035; 
      }
      ::-webkit-scrollbar-thumb {
        background: #6c63ff; 
        border-radius: 4px;
      }

      /* --- SCICON CARD SYSTEM --- */
      .scicon-card {
        position: relative;
        background: #000000;
        clip-path: polygon(
          14px 0, 100% 0,
          100% calc(100% - 14px), calc(100% - 14px) 100%,
          0 100%, 0 14px
        );
      }

      .scicon-border-container {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(34, 211, 238, 0.75), rgba(99, 102, 241, 0.2) 42%, rgba(250, 204, 21, 0.5));
        z-index: -1;
        clip-path: polygon(
          18px 0, 100% 0,
          100% calc(100% - 18px), calc(100% - 18px) 100%,
          0 100%, 0 18px
        );
        opacity: 0.72;
      }
      
      /* Electric Pulse Animation */
      @keyframes electric-pulse {
        0% { 
          filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.6));
        }
        50% { 
          filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.8)) drop-shadow(0 0 15px rgba(99, 102, 241, 0.6));
        }
        100% { 
          filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.6));
        }
      }

      .scicon-electric-border {
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.9), rgba(99, 102, 241, 0.55), rgba(16, 185, 129, 0.75)) !important;
        animation: electric-pulse 3s infinite ease-in-out;
      }
      
      /* Blue Glow Pulse for Referral Button */
      @keyframes blue-glow-pulse {
        0%, 100% { 
          filter: drop-shadow(0 0 2px rgba(92, 92, 255, 0.5));
        }
        50% { 
          filter: drop-shadow(0 0 8px rgba(92, 92, 255, 0.9)) drop-shadow(0 0 12px rgba(92, 92, 255, 0.6));
        }
      }
      
      .blue-glow-animate {
        animation: blue-glow-pulse 2s infinite ease-in-out;
      }

      @keyframes scicon-talk {
        0%, 100% { transform: translate(0, 0) scale(1); filter: saturate(1.1); }
        20% { transform: translate(-1px, 1px) scale(1.015); }
        40% { transform: translate(1px, -1px) scale(1.02); filter: saturate(1.35); }
        60% { transform: translate(1px, 1px) scale(1.01); }
        80% { transform: translate(-1px, -1px) scale(1.018); }
      }

      .scicon-talk-portrait {
        animation: scicon-talk 0.16s steps(2, end) infinite;
      }

      .scicon-inner-bg {
         position: absolute;
         inset: 1px;
         background:
          linear-gradient(180deg, rgba(5, 12, 24, 0.96), rgba(2, 6, 18, 0.92)),
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 42%);
         clip-path: polygon(
          17px 0, 100% 0,
          100% calc(100% - 17px), calc(100% - 17px) 100%,
          0 100%, 0 17px
        );
      }

      .scicon-node {
        display: none;
      }

      .node-tl-1 { top: -4px; left: 16px; }
      .node-tl-2 { top: 16px; left: -4px; }
      .node-tr-1 { top: -4px; right: 16px; }
      .node-tr-2 { top: 16px; right: -4px; }
      .node-bl-1 { bottom: -4px; left: 16px; }
      .node-bl-2 { bottom: 16px; left: -4px; }
      .node-br-1 { bottom: -4px; right: 16px; }
      .node-br-2 { bottom: 16px; right: -4px; }

      /* Buttons */
      .scicon-btn {
        position: relative;
        background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
        border: none;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        transition: all 0.2s ease;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.1em;
      }
      .scicon-btn:hover {
        filter: brightness(1.2);
        transform: translateY(-1px);
        box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
      }
      .scicon-btn:active {
        transform: scale(0.98);
      }
      .scicon-btn-secondary {
        background: transparent;
        border: 1px solid #4b5563;
      }
      .scicon-btn-secondary:hover {
        background: rgba(255,255,255,0.05);
      }

      .rh-nav-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        color: #0f172a;
        padding: 9px 12px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      }

      .rh-nav-button:hover {
        transform: translateY(-1px);
        background: #dbeafe;
        border-color: rgba(96, 165, 250, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
