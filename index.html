<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="base:app_id" content="6935187482a86756bfd57b90" />
    
    <meta name="fc:miniapp" content='{
      "version": "next",
      "imageUrl": "https://sciconshooter.xyz/preview.png",
      "button": {
        "title": "Play Scicon Shooter",
        "action": {
          "type": "launch_frame",
          "name": "Scicon Shooter",
          "url": "https://sciconshooter.xyz",
          "splashImageUrl": "https://sciconshooter.xyz/icon.png",
          "splashBackgroundColor": "#0b1020"
        }
      }
    }' />

    <meta property="og:title" content="Scicon Shooter" />
    <meta property="og:description" content="A sci-fi shooter game on Base. Blast enemies and earn rewards!" />
    <meta property="og:image" content="https://sciconshooter.xyz/preview.png" />
    <meta property="og:url" content="https://sciconshooter.xyz" />
    <meta property="og:type" content="website" />

    <title>SciCon Shooter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap');
      
      body {
        margin: 0;
        overflow: hidden;
        background-color: #0b1020;
        font-family: 'Inter', sans-serif;
        touch-action: none; /* Prevent pull-to-refresh on mobile */
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
      }
      
      /* --- LAYOUT FIXES FOR VERCEL --- */
      #root {
        position: relative;
        width: min(100vw, 430px);
        height: 100vh;
        height: 100dvh;
        max-height: 932px;
        overflow: hidden;
        background: #0b1020;
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.16), 0 24px 90px rgba(0, 0, 0, 0.58);
      }

      @media (max-width: 430px) {
        #root {
          max-height: none;
          box-shadow: none;
        }
      }

      @media (min-width: 900px) {
        #root {
          width: min(100vw, 1024px);
          max-height: none;
        }
      }

      /* Ensures the game background sits behind everything */
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Ensures the React UI sits ON TOP of the game */
      #root > div {
        position: relative;
        z-index: 10;
        height: 100%;
        width: 100%;
      }
      /* ------------------------------- */

      h1, h2, h3, .arcade-font {
        font-family: 'Orbitron', sans-serif;
      }

      .scicon-logo-lockup {
        --chrome-top: #ffffff;
        --chrome-mid: #e6edf8;
        --chrome-cut: #a9b8cf;
        --chrome-blue: rgba(96, 165, 250, 0.82);
        --chrome-pink: rgba(244, 114, 182, 0.56);
        display: inline-grid;
        gap: 0;
        max-width: min(100%, 20rem);
        transform: skewX(-7deg);
        filter:
          drop-shadow(0 12px 18px rgba(0, 0, 0, 0.46))
          drop-shadow(0 0 18px rgba(96, 165, 250, 0.18));
      }

      .scicon-logo-word {
        position: relative;
        display: block;
        width: max-content;
        max-width: 100%;
        overflow: visible;
        color: #f8fbff;
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(2.35rem, 12.5vw, 4.65rem);
        font-style: italic;
        font-weight: 900;
        letter-spacing: 0.055em;
        line-height: 0.8;
        text-transform: uppercase;
        background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.92) 44%, transparent 58%) -160% 0 / 48% 100% no-repeat;
        -webkit-text-fill-color: #f8fbff;
        -webkit-text-stroke: 1.25px rgba(255, 255, 255, 0.98);
        animation: scicon-logo-shine 5.8s ease-in-out infinite;
        text-shadow:
          0 0 1px rgba(255, 255, 255, 0.95),
          1px 1px 0 rgba(203, 213, 225, 0.95),
          2px 2px 0 rgba(51, 65, 85, 0.95),
          3px 3px 0 rgba(3, 7, 18, 0.98),
          -1px -1px 0 var(--chrome-blue),
          1px 2px 0 var(--chrome-pink),
          0 -1px 0 rgba(255, 255, 255, 0.95),
          0 0 14px rgba(219, 234, 254, 0.38);
      }

      .scicon-logo-word::before,
      .scicon-logo-word::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .scicon-logo-word::before {
        z-index: -1;
        color: #020617;
        -webkit-text-fill-color: #020617;
        -webkit-text-stroke: 6px #020617;
        text-shadow:
          1px 0 0 rgba(34, 211, 238, 0.58),
          -1px 0 0 rgba(244, 114, 182, 0.42),
          0 0 12px rgba(15, 23, 42, 0.95);
      }

      .scicon-logo-word::after {
        z-index: 1;
        color: transparent;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.84) 0 18%, transparent 30% 58%, rgba(148, 163, 184, 0.22) 68% 100%),
          linear-gradient(90deg, rgba(191, 219, 254, 0.42), transparent 18% 82%, rgba(248, 113, 113, 0.22));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        -webkit-text-stroke: 0;
      }

      .scicon-logo-word--sub {
        margin-top: 0.06em;
        font-size: clamp(2.1rem, 11vw, 4.25rem);
        letter-spacing: 0.045em;
      }

      @keyframes scicon-logo-shine {
        0%, 62%, 100% {
          background-position: -180% 0, 0 0;
        }
        76% {
          background-position: 220% 0, 0 0;
        }
      }

      /* Custom scrollbar for modals */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a2035; 
      }
      ::-webkit-scrollbar-thumb {
        background: #6c63ff; 
        border-radius: 4px;
      }

      .no-scrollbar {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* --- SCICON CARD SYSTEM --- */
      .scicon-card {
        position: relative;
        background: #000000;
        clip-path: polygon(
          14px 0, 100% 0,
          100% calc(100% - 14px), calc(100% - 14px) 100%,
          0 100%, 0 14px
        );
      }

      .scicon-border-container {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(34, 211, 238, 0.75), rgba(99, 102, 241, 0.2) 42%, rgba(250, 204, 21, 0.5));
        z-index: -1;
        clip-path: polygon(
          18px 0, 100% 0,
          100% calc(100% - 18px), calc(100% - 18px) 100%,
          0 100%, 0 18px
        );
        opacity: 0.72;
      }
      
      /* Electric Pulse Animation */
      @keyframes electric-pulse {
        0% { 
          filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.6));
        }
        50% { 
          filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.8)) drop-shadow(0 0 15px rgba(99, 102, 241, 0.6));
        }
        100% { 
          filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.6));
        }
      }

      .scicon-electric-border {
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.9), rgba(99, 102, 241, 0.55), rgba(16, 185, 129, 0.75)) !important;
        animation: electric-pulse 3s infinite ease-in-out;
      }
      
      /* Blue Glow Pulse for Referral Button */
      @keyframes blue-glow-pulse {
        0%, 100% { 
          filter: drop-shadow(0 0 2px rgba(92, 92, 255, 0.5));
        }
        50% { 
          filter: drop-shadow(0 0 8px rgba(92, 92, 255, 0.9)) drop-shadow(0 0 12px rgba(92, 92, 255, 0.6));
        }
      }
      
      .blue-glow-animate {
        animation: blue-glow-pulse 2s infinite ease-in-out;
      }

      @keyframes scicon-talk {
        0%, 100% { transform: translate(0, 0) scale(1); filter: saturate(1.1); }
        20% { transform: translate(-1px, 1px) scale(1.015); }
        40% { transform: translate(1px, -1px) scale(1.02); filter: saturate(1.35); }
        60% { transform: translate(1px, 1px) scale(1.01); }
        80% { transform: translate(-1px, -1px) scale(1.018); }
      }

      .scicon-talk-portrait {
        animation: scicon-talk 0.16s steps(2, end) infinite;
      }

      .scicon-inner-bg {
         position: absolute;
         inset: 1px;
         background:
          linear-gradient(180deg, rgba(5, 12, 24, 0.96), rgba(2, 6, 18, 0.92)),
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 42%);
         clip-path: polygon(
          17px 0, 100% 0,
          100% calc(100% - 17px), calc(100% - 17px) 100%,
          0 100%, 0 17px
        );
      }

      .scicon-node {
        display: none;
      }

      .node-tl-1 { top: -4px; left: 16px; }
      .node-tl-2 { top: 16px; left: -4px; }
      .node-tr-1 { top: -4px; right: 16px; }
      .node-tr-2 { top: 16px; right: -4px; }
      .node-bl-1 { bottom: -4px; left: 16px; }
      .node-bl-2 { bottom: 16px; left: -4px; }
      .node-br-1 { bottom: -4px; right: 16px; }
      .node-br-2 { bottom: 16px; right: -4px; }

      /* Buttons */
      .scicon-btn {
        position: relative;
        background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
        color: white;
        border: none;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        transition: all 0.2s ease;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.1em;
      }
      .scicon-btn:hover {
        filter: brightness(1.2);
        transform: translateY(-1px);
        box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
      }
      .scicon-btn:active {
        transform: scale(0.98);
      }
      .scicon-btn-secondary {
        background: transparent;
        border: 1px solid #4b5563;
      }
      .scicon-btn-secondary:hover {
        background: rgba(255,255,255,0.05);
      }

      .rh-nav-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        color: #0f172a;
        padding: 9px 12px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      }

      .rh-nav-button:hover {
        transform: translateY(-1px);
        background: #dbeafe;
        border-color: rgba(96, 165, 250, 0.55);
      }

      .scicon-promo-ticker-track {
        animation: scicon-promo-ticker 24s linear infinite;
      }

      @keyframes scicon-promo-ticker {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      @media (max-width: 640px) {
        .tw-modal {
          top: calc(env(safe-area-inset-top) + 12px) !important;
          right: 10px !important;
          bottom: auto !important;
          left: 10px !important;
          width: auto !important;
          max-width: none !important;
          max-height: calc(100dvh - env(safe-area-inset-top) - 24px) !important;
          border-radius: 22px !important;
          overflow: hidden !important;
        }

        .tw-modal [data-scrolly="true"] {
          max-height: calc(100dvh - env(safe-area-inset-top) - 26px) !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
